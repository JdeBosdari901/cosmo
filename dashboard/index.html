// ── Docs ──
function renderMd(md) {
  if (!md) return null;
  const lines = md.split('\n');
  const els = [];
  let i = 0;
  const inl = t => {
    const parts = [];
    let r = t;
    // bold
    r = r.replace(/\*\*(.+?)\*\*/g, '§B§$1§/B§');
    // inline code
    r = r.replace(/`([^`]+)`/g, '§C§$1§/C§');
    // split and rebuild
    const segs = r.split(/(§[BC]§|§\/[BC]§)/);
    let bold = false, code = false;
    segs.forEach((s,j) => {
      if (s === '§B§') { bold = true; return; }
      if (s === '§/B§') { bold = false; return; }
      if (s === '§C§') { code = true; return; }
      if (s === '§/C§') { code = false; return; }
      if (!s) return;
      if (code) parts.push(h('code', {key:j, style:{background:'var(--stone-100)',padding:'1px 5px',borderRadius:3,fontSize:12,fontFamily:'SF Mono, Fira Code, monospace'}}, s));
      else if (bold) parts.push(h('strong', {key:j}, s));
      else parts.push(s);
    });
    return parts;
  };
  while (i < lines.length) {
    const ln = lines[i];
    if (ln.startsWith('### ')) { els.push(h('h4', {key:i, style:{fontSize:15,fontWeight:600,margin:'20px 0 8px',color:'var(--stone-700)'}}, inl(ln.slice(4)))); i++; }
    else if (ln.startsWith('## ')) { els.push(h('h3', {key:i, style:{fontSize:17,fontWeight:700,margin:'28px 0 10px',color:'var(--stone-800)',borderBottom:'1px solid var(--stone-200)',paddingBottom:6}}, inl(ln.slice(3)))); i++; }
    else if (ln.startsWith('| ') && lines[i+1] && lines[i+1].match(/^\|[\s-|]+$/)) {
      // table
      const hdrs = ln.split('|').filter(c=>c.trim()).map(c=>c.trim());
      i += 2; // skip header + separator
      const rows = [];
      while (i < lines.length && lines[i].startsWith('| ')) {
        rows.push(lines[i].split('|').filter(c=>c.trim()).map(c=>c.trim()));
        i++;
      }
      els.push(h('div',{key:'t'+i,style:{overflowX:'auto',margin:'12px 0'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:13}},
          h('thead',null,h('tr',null,hdrs.map((hd,j)=>h('th',{key:j,style:{textAlign:'left',padding:'8px 12px',borderBottom:'2px solid var(--stone-200)',fontWeight:600,color:'var(--stone-600)',fontSize:12}},inl(hd))))),
          h('tbody',null,rows.map((row,ri)=>h('tr',{key:ri},row.map((cell,ci)=>h('td',{key:ci,style:{padding:'6px 12px',borderBottom:'1px solid var(--stone-100)',color:'var(--stone-600)'}},inl(cell))))))
        )
      ));
    }
    else if (ln.startsWith('- ')) {
      const items = [];
      while (i < lines.length && lines[i].startsWith('- ')) { items.push(lines[i].slice(2)); i++; }
      els.push(h('ul',{key:'u'+i,style:{margin:'8px 0',paddingLeft:20}},items.map((it,j)=>h('li',{key:j,style:{fontSize:14,lineHeight:1.6,color:'var(--stone-600)',marginBottom:4}},inl(it)))));
    }
    else if (ln.match(/^\d+\.\s/)) {
      const items = [];
      while (i < lines.length && lines[i].match(/^\d+\.\s/)) { items.push(lines[i].replace(/^\d+\.\s/,'')); i++; }
      els.push(h('ol',{key:'o'+i,style:{margin:'8px 0',paddingLeft:20}},items.map((it,j)=>h('li',{key:j,style:{fontSize:14,lineHeight:1.6,color:'var(--stone-600)',marginBottom:4}},inl(it)))));
    }
    else if (ln.trim() === '') { i++; }
    else { els.push(h('p',{key:i,style:{fontSize:14,lineHeight:1.7,color:'var(--stone-600)',margin:'8px 0'}},inl(ln))); i++; }
  }
  return h('div', null, els);
}

const DOC_STATUS_COLORS = {
  live:       { bg:'#e8f5e9', text:'#2e7d32', dot:'#43a047' },
  designed:   { bg:'#e3f2fd', text:'#1565c0', dot:'#42a5f5' },
  diagnostic: { bg:'#fff8e1', text:'#f57f17', dot:'#fbc02d' },
  retired:    { bg:'#fce4ec', text:'#c62828', dot:'#ef5350' },
};
const DOC_TYPE_LABELS = {
  edge_function:'Edge Functions', database_table:'Database Tables', database_view:'Database Views',
  n8n_workflow:'n8n Workflows', pipeline:'Pipelines', dashboard:'Dashboards',
  governance_file:'Governance Files', external_tool:'External Tools', process:'Processes',
};

function Docs() {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [activeType, setActiveType] = useState('All');
  const [activeTags, setActiveTags] = useState([]);
  const [selectedId, setSelectedId] = useState(null);

  useEffect(() => {
    sb.from('cosmo_docs').select('*').order('name').then(({data}) => {
      setDocs(data || []);
      setLoading(false);
    });
  }, []);

  const allTypes = useMemo(() => [...new Set(docs.map(d=>d.type))].sort(), [docs]);
  const allTags = useMemo(() => [...new Set(docs.flatMap(d=>d.tags||[]))].sort(), [docs]);

  const filtered = useMemo(() => docs.filter(d => {
    if (activeType !== 'All' && d.type !== activeType) return false;
    if (activeTags.length > 0 && !activeTags.every(t => (d.tags||[]).includes(t))) return false;
    if (search) {
      const s = search.toLowerCase();
      return d.name.toLowerCase().includes(s) || (d.summary||'').toLowerCase().includes(s) || (d.body||'').toLowerCase().includes(s) || (d.tags||[]).some(t=>t.includes(s));
    }
    return true;
  }), [docs, search, activeType, activeTags]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(d => { if(!g[d.type]) g[d.type]=[]; g[d.type].push(d); });
    return g;
  }, [filtered]);

  const toggleTag = t => setActiveTags(p => p.includes(t) ? p.filter(x=>x!==t) : [...p, t]);
  const detail = selectedId ? docs.find(d=>d.id===selectedId) : null;

  if (loading) return h('div',{style:{padding:40,textAlign:'center',color:'var(--stone-400)'}}, h('span',{className:'spinner'}));

  if (detail) {
    const sc = DOC_STATUS_COLORS[detail.status] || DOC_STATUS_COLORS.live;
    const referencedBy = docs.filter(d => (d.dependencies||[]).includes(detail.name));
    const sections = [
      {label:'What it does', content:detail.summary},
      {label:'How to use it', content:detail.usage_notes},
      {label:'Calling pattern', content:detail.calling_pattern, mono:true},
      {label:'Dependencies', deps:(detail.dependencies||[])},
      {label:'Referenced by', deps:referencedBy.map(d=>d.name)},
      {label:'Notes & learnings', content:detail.notes},
    ].filter(s => s.content || (s.deps && s.deps.length > 0));

    const renderDepLinks = (deps) => h('div', {style:{display:'flex',gap:6,flexWrap:'wrap'}},
      deps.map(dep => {
        const linked = docs.find(d => d.name === dep);
        return linked
          ? h('button', {key:dep, onClick:()=>setSelectedId(linked.id), style:{padding:'3px 12px',fontSize:12,background:'var(--olive-50)',border:'1px solid var(--olive-300)',borderRadius:4,color:'var(--olive-700)',cursor:'pointer',fontFamily:'inherit',fontWeight:500}}, dep)
          : h('span', {key:dep, style:{padding:'3px 12px',fontSize:12,background:'var(--stone-50)',border:'1px solid var(--stone-200)',borderRadius:4,color:'var(--stone-500)'}}, dep);
      })
    );

    return h('div', null,
      h('button', {onClick:()=>setSelectedId(null), style:{background:'none',border:'none',cursor:'pointer',color:'var(--olive-600)',fontSize:13,marginBottom:20,padding:0}}, '← Back to list'),
      h('div', {style:{background:'white',border:'1px solid var(--stone-200)',borderRadius:10,overflow:'hidden'}},
        h('div', {style:{padding:'24px 28px 18px',borderBottom:'1px solid var(--stone-100)'}},
          h('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:6}},
            h('h2', {style:{margin:0,fontSize:22,fontWeight:600}}, detail.name),
            h('span', {style:{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 10px',borderRadius:12,fontSize:11,fontWeight:600,background:sc.bg,color:sc.text}},
              h('span',{style:{width:6,height:6,borderRadius:'50%',background:sc.dot}}), detail.status
            ),
          ),
          h('div', {style:{fontSize:13,color:'var(--stone-500)'}},
            (DOC_TYPE_LABELS[detail.type]||detail.type).replace(/s$/,''), ' · ', detail.version||'—', ' · Updated ', detail.updated_at ? new Date(detail.updated_at).toLocaleDateString() : '—'
          ),
          (detail.tags||[]).length > 0 && h('div', {style:{marginTop:8,display:'flex',gap:5,flexWrap:'wrap'}},
            detail.tags.map(t => h('span',{key:t,style:{padding:'2px 8px',fontSize:11,background:'var(--stone-100)',border:'1px solid var(--stone-200)',borderRadius:4,color:'var(--stone-500)'}},t))
          ),
        ),
        sections.map((s,i) =>
          h('div', {key:i, style:{padding:'16px 28px',borderBottom: (detail.body || i<sections.length-1) ?'1px solid var(--stone-100)':'none'}},
            h('div', {style:{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--stone-400)',marginBottom:5}}, s.label),
            s.mono
              ? h('pre', {style:{fontSize:12,fontFamily:'SF Mono, Fira Code, monospace',background:'var(--stone-50)',padding:12,borderRadius:6,overflowX:'auto',margin:0,lineHeight:1.5,color:'var(--stone-600)',whiteSpace:'pre-wrap'}}, s.content)
              : s.deps
                ? renderDepLinks(s.deps)
                : h('div', {style:{fontSize:14,lineHeight:1.6,color:'var(--stone-600)'}}, s.content)
          )
        ),
        detail.body && h('div', {style:{padding:'24px 28px'}}, renderMd(detail.body)),
      ),
    );
  }

  return h('div', null,
    h('input', {type:'text', placeholder:'Search by name, description, or tag…', value:search, onChange:e=>setSearch(e.target.value),
      style:{width:'100%',boxSizing:'border-box',padding:'12px 16px',fontSize:14,border:'1px solid var(--stone-300)',borderRadius:8,background:'white',outline:'none',marginBottom:16,fontFamily:'inherit'}}),
    h('div', {style:{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}},
      ['All', ...allTypes].map(t =>
        h('button', {key:t, onClick:()=>setActiveType(t), style:{
          padding:'5px 14px',fontSize:12,fontWeight:500,borderRadius:20,cursor:'pointer',border: activeType===t ? '1.5px solid var(--olive-700)':'1px solid var(--stone-300)',
          background:activeType===t?'var(--olive-700)':'white', color:activeType===t?'white':'var(--stone-500)',transition:'all 0.15s',fontFamily:'inherit'
        }}, t==='All'?t:(DOC_TYPE_LABELS[t]||t) + ' (' + docs.filter(d=>d.type===t).length + ')')
      )
    ),
    h('div', {style:{display:'flex',gap:5,marginBottom:24,flexWrap:'wrap'}},
      allTags.map(t =>
        h('button', {key:t, onClick:()=>toggleTag(t), style:{
          padding:'2px 9px',fontSize:11,borderRadius:4,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s',
          border:activeTags.includes(t)?'1px solid var(--olive-400)':'1px solid var(--stone-200)',
          background:activeTags.includes(t)?'var(--olive-50)':'var(--stone-50)', color:activeTags.includes(t)?'var(--olive-700)':'var(--stone-400)'
        }}, t)
      ),
      activeTags.length > 0 && h('button',{onClick:()=>setActiveTags([]),style:{padding:'2px 9px',fontSize:11,border:'none',background:'none',color:'var(--red-500)',cursor:'pointer',textDecoration:'underline',fontFamily:'inherit'}},'clear')
    ),
    Object.keys(grouped).length === 0
      ? h('div',{style:{textAlign:'center',padding:48,color:'var(--stone-400)'}},'No results match your search.')
      : Object.entries(grouped).map(([type, items]) =>
        h('div', {key:type, style:{marginBottom:28}},
          h('h3', {style:{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,color:'var(--olive-600)',borderBottom:'2px solid var(--olive-600)',paddingBottom:6,marginBottom:10}},
            DOC_TYPE_LABELS[type]||type, h('span',{style:{fontWeight:400,color:'var(--stone-400)',marginLeft:8}},items.length)
          ),
          items.map(item => {
            const sc = DOC_STATUS_COLORS[item.status]||DOC_STATUS_COLORS.live;
            return h('div', {key:item.id, onClick:()=>setSelectedId(item.id), style:{
              background:'white',border:'1px solid var(--stone-200)',borderRadius:8,padding:'14px 18px',cursor:'pointer',marginBottom:6,transition:'all 0.15s'
            },
            onMouseEnter:e=>{e.currentTarget.style.borderColor='var(--olive-600)';e.currentTarget.style.boxShadow='0 2px 8px rgba(66,80,42,0.08)'},
            onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--stone-200)';e.currentTarget.style.boxShadow='none'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
                h('div',{style:{flex:1}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:3}},
                    h('span',{style:{fontSize:15,fontWeight:600}}, item.name),
                    h('span',{style:{display:'inline-flex',alignItems:'center',gap:4,padding:'1px 7px',borderRadius:10,fontSize:10,fontWeight:600,background:sc.bg,color:sc.text}},
                      h('span',{style:{width:5,height:5,borderRadius:'50%',background:sc.dot}}), item.status
                    ),
                    item.version && h('span',{style:{fontSize:11,color:'var(--stone-400)'}},item.version),
                  ),
                  h('div',{style:{fontSize:13,color:'var(--stone-500)',lineHeight:1.5,marginBottom:6}}, item.summary),
                  h('div',{style:{display:'flex',gap:4,flexWrap:'wrap'}},
                    (item.tags||[]).map(t => h('span',{key:t,style:{padding:'1px 6px',fontSize:10,background:'var(--stone-50)',border:'1px solid var(--stone-200)',borderRadius:3,color:'var(--stone-400)'}},t))
                  ),
                ),
                h('span',{style:{fontSize:16,color:'var(--stone-300)',marginLeft:12,flexShrink:0}},'→'),
              ),
            );
          }),
        )
      ),
  );
}


// ── Attribution Component ─────────────────────────────────────────────────
function Attribution() {
  const { useState, useEffect, useCallback } = React;

  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [overview, setOverview] = useState(null);
  const [channels, setChannels] = useState([]);
  const [comparison, setComparison] = useState([]);
  const [aiPlatforms, setAiPlatforms] = useState([]);
  const [identityData, setIdentityData] = useState([]);
  const [activeTab, setActiveTab] = useState('overview');
  const [sortCol, setSortCol] = useState('revenue');
  const [sortAsc, setSortAsc] = useState(false);

  // Date range — default last 7 days
  const today = new Date().toISOString().slice(0,10);
  const sevenDaysAgo = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
  const [dateFrom, setDateFrom] = useState(sevenDaysAgo);
  const [dateTo, setDateTo] = useState(today);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [ovRes, chRes, compRes, aiRes, idRes] = await Promise.all([
        sb.rpc('get_attribution_overview', { p_from: dateFrom, p_to: dateTo }),
        sb.rpc('get_attribution_channels', { p_from: dateFrom, p_to: dateTo }),
        sb.rpc('get_attribution_daily_comparison', { p_from: dateFrom, p_to: dateTo }),
        sb.rpc('get_attribution_ai_platforms', { p_from: dateFrom, p_to: dateTo }),
        sb.rpc('get_attribution_identity', { p_from: dateFrom, p_to: dateTo }),
      ]);
      if (ovRes.error) throw ovRes.error;
      if (chRes.error) throw chRes.error;
      if (compRes.error) throw compRes.error;
      if (aiRes.error) throw aiRes.error;
      if (idRes.error) throw idRes.error;
      setOverview(ovRes.data);
      setChannels(chRes.data || []);
      setComparison(compRes.data || []);
      setAiPlatforms(aiRes.data || []);
      setIdentityData(idRes.data || []);
    } catch(e) {
      setError(e.message || 'Failed to load attribution data');
    } finally {
      setLoading(false);
    }
  }, [dateFrom, dateTo]);

  useEffect(() => { load(); }, [load]);

  // Channel colours
  const chColor = ch => {
    if (!ch) return 'var(--stone-300)';
    const lc = ch.toLowerCase();
    if (lc.includes('google') && lc.includes('cpc')) return '#4285f4';
    if (lc.includes('bing') && lc.includes('cpc')) return '#008272';
    if (lc.includes('google') && lc.includes('organic')) return '#34a853';
    if (lc.includes('bing') && lc.includes('organic')) return '#00a4ef';
    if (lc === 'direct') return 'var(--stone-500)';
    if (lc === 'email') return '#f56300';
    if (lc === 'ai search') return '#74aa9c';
    if (lc === 'social') return '#e1306c';
    if (lc === 'referral') return '#6366f1';
    if (lc === 'internal') return 'var(--olive-400)';
    return 'var(--olive-400)';
  };

  const fmt = n => n != null ? '£' + parseFloat(n).toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
  const fmtN = n => n != null ? parseInt(n).toLocaleString('en-GB') : '—';
  const pct = (a, b) => b > 0 ? ((a / b) * 100).toFixed(1) + '%' : '—';

  // Sortable channel data
  const sortedChannels = [...channels].sort((a, b) => {
    const va = a[sortCol] ?? 0, vb = b[sortCol] ?? 0;
    return sortAsc ? va - vb : vb - va;
  });
  const maxRevenue = channels.length ? Math.max(...channels.map(c => c.revenue || 0)) : 1;

  const toggleSort = col => {
    if (sortCol === col) setSortAsc(!sortAsc);
    else { setSortCol(col); setSortAsc(false); }
  };
  const sortArrow = col => sortCol === col ? (sortAsc ? ' ↑' : ' ↓') : '';

  // CSV export for channel data
  const downloadChannelCSV = () => {
    const headers = ['Channel','Sessions','Views','Purchases','Revenue','Conv Rate %'];
    const rows = sortedChannels.map(c =>
      [c.channel, c.sessions, c.views, c.purchases, c.revenue, c.conv_rate].join(',')
    );
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'attribution-channels-' + dateFrom + '-' + dateTo + '.csv';
    a.click();
  };

  // CSV export for comparison data
  const downloadComparisonCSV = () => {
    const headers = ['Date','Elevar Purchases','Elevar Revenue','Shopify Orders','Shopify Revenue','Capture Rate %','Revenue Capture %'];
    const rows = comparison.map(d => {
      const capRate = d.shopify_orders > 0 ? ((d.elevar_purchase_events / d.shopify_orders) * 100).toFixed(1) : '';
      const revRate = d.shopify_revenue > 0 ? ((d.elevar_purchase_revenue / d.shopify_revenue) * 100).toFixed(1) : '';
      return [d.date, d.elevar_purchase_events, d.elevar_purchase_revenue, d.shopify_orders, d.shopify_revenue, capRate, revRate].join(',');
    });
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'attribution-comparison-' + dateFrom + '-' + dateTo + '.csv';
    a.click();
  };

  if (loading) return h('div', {style:{padding:'40px', textAlign:'center', color:'var(--stone-400)'}}, 'Loading attribution data…');
  if (error) return h('div', {style:{padding:'20px', color:'var(--red-500)'}}, 'Error: ', error);

  // Comparison totals
  const compTotals = comparison.reduce((acc, d) => ({
    ePurch: acc.ePurch + (d.elevar_purchase_events || 0),
    eRev:   acc.eRev   + parseFloat(d.elevar_purchase_revenue || 0),
    sOrd:   acc.sOrd   + (d.shopify_orders || 0),
    sRev:   acc.sRev   + parseFloat(d.shopify_revenue || 0),
  }), {ePurch:0, eRev:0, sOrd:0, sRev:0});

  return h('div', null,

    // Date range + tab controls
    h('div', {style:{display:'flex', gap:'12px', alignItems:'center', marginBottom:'20px', flexWrap:'wrap'}},
      h('div', {style:{display:'flex', gap:'8px', alignItems:'center'}},
        h('label', {style:{fontSize:'12px', color:'var(--stone-500)'}}, 'From'),
        h('input', {type:'date', value:dateFrom, onChange:e=>setDateFrom(e.target.value), style:{fontSize:'13px', padding:'6px 10px', border:'1px solid var(--stone-200)', borderRadius:'6px'}}),
        h('label', {style:{fontSize:'12px', color:'var(--stone-500)'}}, 'to'),
        h('input', {type:'date', value:dateTo, onChange:e=>setDateTo(e.target.value), style:{fontSize:'13px', padding:'6px 10px', border:'1px solid var(--stone-200)', borderRadius:'6px'}}),
        h('button', {className:'btn btn-primary btn-sm', onClick:load}, 'Apply'),
      ),
      h('div', {style:{marginLeft:'auto', display:'flex', gap:'8px'}},
        h('button', {className:'btn btn-sm '+(activeTab==='overview'?'btn-primary':'btn-ghost'), onClick:()=>setActiveTab('overview')}, 'Overview'),
        h('button', {className:'btn btn-sm '+(activeTab==='comparison'?'btn-primary':'btn-ghost'), onClick:()=>setActiveTab('comparison')}, 'Daily comparison'),
        h('button', {className:'btn btn-sm '+(activeTab==='identity'?'btn-primary':'btn-ghost'), onClick:()=>setActiveTab('identity')}, 'Identity'),
      ),
    ),

    // ── OVERVIEW TAB ──────────────────────────────────────────────────────
    activeTab === 'overview' && h('div', null,

      // KPI cards
      overview && h('div', {style:{display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:'12px', marginBottom:'24px'}},
        ...[
          ['Revenue', fmt(overview.total_revenue), null],
          ['Purchases', fmtN(overview.total_purchases), fmt(overview.avg_order_value) + ' AOV'],
          ['Sessions', fmtN(overview.total_sessions), null],
          ['Product views', fmtN(overview.total_views), null],
          ['Conv. rate', overview.total_sessions > 0 ? ((overview.total_purchases / overview.total_sessions) * 100).toFixed(2) + '%' : '—', 'purchases ÷ sessions'],
        ].map(([label, val, sub]) =>
          h('div', {key:label, className:'alert-card', style:{padding:'14px 16px'}},
            h('div', {style:{fontSize:'11px', color:'var(--stone-500)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'4px'}}, label),
            h('div', {style:{fontSize:'22px', fontWeight:'600', color:'var(--stone-800)'}}, val),
            sub && h('div', {style:{fontSize:'11px', color:'var(--stone-400)', marginTop:'2px'}}, sub),
          )
        )
      ),

      // Channel breakdown table
      h('div', {style:{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px'}},
        h('div', {className:'section-title', style:{margin:0}}, 'Revenue by channel'),
        h('button', {className:'btn btn-ghost btn-sm', onClick:downloadChannelCSV, style:{fontSize:'12px'}}, '↓ CSV'),
      ),
      h('table', {className:'data-table', style:{marginBottom:'24px'}},
        h('thead', null, h('tr', null,
          h('th', {style:{cursor:'pointer'}, onClick:()=>toggleSort('channel')}, 'Channel' + sortArrow('channel')),
          h('th', {style:{textAlign:'right', cursor:'pointer'}, onClick:()=>toggleSort('sessions')}, 'Sessions' + sortArrow('sessions')),
          h('th', {style:{textAlign:'right', cursor:'pointer'}, onClick:()=>toggleSort('views')}, 'Views' + sortArrow('views')),
          h('th', {style:{textAlign:'right', cursor:'pointer'}, onClick:()=>toggleSort('purchases')}, 'Purchases' + sortArrow('purchases')),
          h('th', {style:{textAlign:'right', cursor:'pointer'}, onClick:()=>toggleSort('revenue')}, 'Revenue' + sortArrow('revenue')),
          h('th', null, ''),
          h('th', {style:{textAlign:'right', cursor:'pointer'}, onClick:()=>toggleSort('conv_rate')}, 'Conv %' + sortArrow('conv_rate')),
        )),
        h('tbody', null, sortedChannels.map((ch, i) =>
          h('tr', {key:i},
            h('td', null,
              h('div', {style:{display:'flex', alignItems:'center', gap:'8px'}},
                h('div', {style:{width:'8px', height:'8px', borderRadius:'50%', background:chColor(ch.channel), flexShrink:0}}),
                h('span', {style:{fontWeight:'500', color:'var(--stone-700)'}}, ch.channel),
              )
            ),
            h('td', {style:{textAlign:'right'}}, fmtN(ch.sessions)),

            ['30d avg', 'Trailing 30-day session-weighted moving average of the email identification rate. Calculated as sum(Identified) ÷ sum(Sessions) across the preceding 30 days. Smooths daily fluctuations to reveal the underlying trend. Shows "(Nd)" suffix when fewer than 30 days of data are available.'],
            ['Customer', 'Sessions where Elevar matched the visitor to an existing Shopify customer record. A subset of all sessions, but not a subset of Identified — a visitor can be a known customer without being email-identified in that session.'],
            ['Cust %', 'Customer match rate: Customer ÷ Sessions × 100.'],

          ].map(([term, desc], i) =>

          )

}

// ── BOM Swap Component ────────────────────────────────────────────────────
function BomSwap({ onBack }) {
  const { useState } = React;
  const [packSku, setPackSku] = useState('');
  const [loading, setLoading] = useState(false);
  const [components, setComponents] = useState(null);
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [newSku, setNewSku] = useState('');
  const [confirming, setConfirming] = useState(false);
  const [swapping, setSwapping] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const handleLookup = async () => {
    setLoading(true); setError(null); setComponents(null); setSelectedIdx(null); setResult(null); setNewSku('');
    try {
      const { data, error: err } = await sb.functions.invoke('bom-swap', { body: { action: 'lookup', pack_sku: packSku.trim() } });
      if (err) throw err;
      const parsed = typeof data === 'string' ? JSON.parse(data) : data;
      if (parsed.error) throw new Error(parsed.error);
      setComponents(parsed.components);
    } catch (e) { setError(e.message || 'Lookup failed'); }
    finally { setLoading(false); }
  };

  const handleSwap = async () => {
    setSwapping(true); setError(null);
    try {
      const comp = components[selectedIdx];
      const { data, error: err } = await sb.functions.invoke('bom-swap', {
        body: { action: 'swap', pack_sku: packSku.trim(), old_sku: comp.ingredient_sku, new_sku: newSku.trim() }
      });
      if (err) throw err;
      const parsed = typeof data === 'string' ? JSON.parse(data) : data;
      if (parsed.error) throw new Error(JSON.stringify(parsed));
      setResult(parsed); setConfirming(false);
    } catch (e) { setError(e.message || 'Swap failed'); }
    finally { setSwapping(false); }
  };

  const selectedComp = selectedIdx != null && components ? components[selectedIdx] : null;

  return h('div', null,
    h('button', {className:'btn btn-ghost btn-sm', style:{marginBottom:'16px'}, onClick:onBack}, '\u2190 Back to processes'),
    h('div', {style:{display:'flex', alignItems:'center', gap:'10px', marginBottom:'20px'}},
      h('div', {style:{width:'36px', height:'36px', borderRadius:'8px', background:'var(--olive-50)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px'}}, '\uD83D\uDD04'),
      h('div', null,
        h('div', {style:{fontSize:'16px', fontWeight:'600', color:'var(--stone-800)'}}, 'BOM Component Swap'),
        h('div', {style:{fontSize:'12px', color:'var(--stone-500)'}}, 'Three-system update: Katana \u2192 Shopify Metaobject \u2192 Supabase'),
      ),
    ),

    // Step 1: Pack SKU input
    !result && h('div', {style:{maxWidth:'640px', marginBottom:'20px'}},
      h('label', {style:{display:'block', fontSize:'12px', fontWeight:'500', color:'var(--stone-600)', marginBottom:'4px'}}, 'Pack SKU'),
      h('div', {style:{display:'flex', gap:'8px'}},
        h('input', {
          type:'text', value:packSku, placeholder:'PACKCM-PK',
          onChange: e => { setPackSku(e.target.value); setComponents(null); setSelectedIdx(null); setResult(null); },
          disabled: loading || swapping,
          onKeyDown: e => { if (e.key === 'Enter' && packSku.trim()) handleLookup(); },
          style:{flex:1, fontSize:'13px', padding:'8px 12px', border:'1px solid var(--stone-200)', borderRadius:'6px'},
        }),
        h('button', {className:'btn btn-primary btn-sm', disabled:!packSku.trim()||loading, onClick:handleLookup},
          loading ? 'Loading\u2026' : 'Load BOM'),
      ),
    ),

    // Step 2: Component table
    components && !result && h('div', {style:{marginTop:'16px', marginBottom:'20px', maxWidth:'640px'}},
      h('div', {style:{fontSize:'12px', fontWeight:'600', color:'var(--stone-500)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'8px'}},
        components.length + ' components'),
      h('table', {style:{width:'100%', borderCollapse:'collapse', fontSize:'13px'}},
        h('thead', null,
          h('tr', {style:{borderBottom:'2px solid var(--stone-200)'}},
            h('th', {style:{padding:'6px 8px', textAlign:'left', width:'40px'}}, ''),
            h('th', {style:{padding:'6px 8px', textAlign:'left'}}, 'SKU'),
            h('th', {style:{padding:'6px 8px', textAlign:'left'}}, 'Name'),
            h('th', {style:{padding:'6px 8px', textAlign:'right'}}, 'Qty'),
          ),
        ),
        h('tbody', null,
          ...components.map((c, i) =>
            h('tr', {
              key:i,
              style:{borderBottom:'1px solid var(--stone-100)', background:selectedIdx===i?'var(--olive-50)':'transparent', cursor:'pointer'},
              onClick:() => setSelectedIdx(i),
            },
              h('td', {style:{padding:'6px 8px'}},
                h('input', {type:'radio', name:'bom-sel', checked:selectedIdx===i, onChange:()=>setSelectedIdx(i)})),
              h('td', {style:{padding:'6px 8px', fontFamily:'monospace', fontSize:'12px'}}, c.ingredient_sku),
              h('td', {style:{padding:'6px 8px'}}, c.product_name || '\u2014'),
              h('td', {style:{padding:'6px 8px', textAlign:'right'}}, c.quantity),
            )
          ),
        ),
      ),
    ),

    // Step 3: Replacement SKU
    selectedComp && !confirming && !result && h('div', {style:{maxWidth:'640px', marginTop:'16px'}},
      h('label', {style:{display:'block', fontSize:'12px', fontWeight:'500', color:'var(--stone-600)', marginBottom:'4px'}},
        'Replace ' + selectedComp.ingredient_sku + ' (\u00d7' + selectedComp.quantity + ') with:'),
      h('div', {style:{display:'flex', gap:'8px'}},
        h('input', {
          type:'text', value:newSku, placeholder:'CRATMON-90/120',
          onChange: e => setNewSku(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter' && newSku.trim()) setConfirming(true); },
          style:{flex:1, fontSize:'13px', padding:'8px 12px', border:'1px solid var(--stone-200)', borderRadius:'6px'},
        }),
        h('button', {className:'btn btn-primary btn-sm', disabled:!newSku.trim(), onClick:()=>setConfirming(true)}, 'Preview'),
      ),
    ),

    // Step 4: Confirmation
    confirming && !result && h('div', {style:{marginTop:'20px', padding:'16px 20px', background:'#fffbeb', border:'1px solid #fde68a', borderRadius:'8px', maxWidth:'640px'}},
      h('div', {style:{fontSize:'14px', fontWeight:'600', color:'#92400e', marginBottom:'8px'}}, 'Confirm BOM Swap'),
      h('div', {style:{fontSize:'13px', color:'#78350f', lineHeight:'1.6'}},
        'Pack: ', h('strong', null, packSku), h('br'),
        'Remove: ', h('code', null, selectedComp.ingredient_sku), ' (', selectedComp.product_name || '\u2014', ') \u00d7', selectedComp.quantity, h('br'),
        'Add: ', h('code', null, newSku.trim()), ' \u00d7', selectedComp.quantity, h('br'), h('br'),
        'This will update Katana BOM, Shopify Metaobject, and Supabase product_bom.',
      ),
      h('div', {style:{display:'flex', gap:'10px', marginTop:'16px'}},
        h('button', {className:'btn btn-sm', disabled:swapping, onClick:handleSwap,
          style:{background:'#dc2626', borderColor:'#dc2626', color:'#fff'}},
          swapping ? 'Executing\u2026' : 'Execute Swap'),
        h('button', {className:'btn btn-ghost btn-sm', onClick:()=>setConfirming(false), disabled:swapping}, 'Cancel'),
      ),
    ),

    // Error
    error && h('div', {style:{marginTop:'20px', padding:'14px 18px', background:'#fef2f2', border:'1px solid #fecaca', borderRadius:'8px', maxWidth:'640px'}},
      h('div', {style:{fontSize:'12px', fontWeight:'600', color:'#dc2626', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'6px'}}, 'Error'),
      h('div', {style:{fontSize:'13px', color:'#991b1b', fontFamily:'monospace', whiteSpace:'pre-wrap'}}, typeof error === 'object' ? JSON.stringify(error,null,2) : error),
    ),

    // Result
    result && h('div', {style:{marginTop:'20px', maxWidth:'640px'}},
      h('div', {style:{padding:'14px 18px', background:result.status==='complete'?'#f0fdf4':'#fffbeb', border:'1px solid '+(result.status==='complete'?'#bbf7d0':'#fde68a'), borderRadius:'8px'}},
        h('div', {style:{fontSize:'14px', fontWeight:'600', color:result.status==='complete'?'var(--olive-700)':'#92400e', marginBottom:'8px'}},
          result.status === 'complete' ? '\u2713 Swap Complete' : '\u26A0 Swap Complete with Errors'),
        h('div', {style:{fontSize:'13px', lineHeight:'1.6', marginBottom:'12px'}},
          h('code', null, result.old_sku), ' \u2192 ', h('code', null, result.new_sku), ' (\u00d7', result.quantity, ')'),
        h('div', {style:{fontSize:'12px', lineHeight:'1.8'}},
          h('div', null, '\u2022 Katana: ', result.results?.katana_create?.status==='created' ? '\u2713 Done' : '\u2717 Failed'),
          h('div', null, '\u2022 Shopify: ', result.results?.shopify?.updated ? '\u2713 ' + (result.results.shopify.new_name||'Done') : result.results?.shopify?.skipped ? '\u229F ' + result.results.shopify.reason : '\u2717 Failed'),
          h('div', null, '\u2022 Supabase: ', result.results?.supabase?.updated ? '\u2713 Done' : '\u2717 Failed'),
          result.results?.verification && h('div', null, '\u2022 Verification: ',
            result.results.verification.contains_new && result.results.verification.does_not_contain_old ? '\u2713 Confirmed' : '\u26A0 Check manually'),
        ),
        result.errors && result.errors.length > 0 && h('div', {style:{marginTop:'8px'}},
          ...result.errors.map((e,i) => h('div', {key:i, style:{color:'#dc2626', fontSize:'12px'}}, '\u26A0 ' + e))),
      ),
      h('details', {style:{marginTop:'12px'}},
        h('summary', {style:{fontSize:'11px', color:'var(--stone-400)', cursor:'pointer'}}, 'Raw response'),
        h('pre', {style:{fontSize:'11px', color:'var(--stone-500)', fontFamily:'monospace', whiteSpace:'pre-wrap', maxHeight:'300px', overflow:'auto', marginTop:'4px'}},
          JSON.stringify(result, null, 2)),
      ),
    ),
  );
}
// ── End BOM Swap Component ────────────────────────────────────────────────


// ── Processes Component ───────────────────────────────────────────────────
function Processes() {
  const { useState } = React;

  const [active, setActive] = useState(null);
  const [form, setForm] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  const reset = () => { setActive(null); setForm({}); setResult(null); setError(null); };

  const invoke = async (fn, body) => {
    setSubmitting(true); setResult(null); setError(null);
    try {
      const { data, error: err } = await sb.functions.invoke(fn, { body });
      if (err) throw err;
      setResult(typeof data === 'string' ? JSON.parse(data) : data);
    } catch(e) {
      setError(e.message || 'Request failed');
    } finally {
      setSubmitting(false);
    }
  };

  const categories = [
    {
      id: 'products', label: 'Products',
      processes: [
        {
          id: 'create-product', name: 'Create Product',
          desc: 'New Shopify product (DRAFT) with Katana sync and post-creation verification',
          icon: '+',
          fields: [
            { key: 'title', label: 'Product title', required: true, placeholder: 'Achillea Love Parade Plants' },
            { key: 'handle', label: 'Handle (slug)', required: true, placeholder: 'achillea-love-parade-plants' },
            { key: 'product_type', label: 'Product type', required: true, type: 'select',
              options: ['Perennial','Tree','Hedge','Climber','Bulb','Rose','Fruit','Sweet Pea','Seed'] },
            { key: 'sku', label: 'SKU', required: true, placeholder: 'ACHLOVPAR-P9' },
            { key: 'price', label: 'Price (£)', required: true, placeholder: '8.99', type: 'number' },
            { key: 'variant_form', label: 'Variant form', placeholder: 'Potted' },
            { key: 'variant_size', label: 'Variant size', placeholder: 'P9' },
            { key: 'subtitle', label: 'Subtitle (species name)', placeholder: 'Achillea millefolium' },
          ],
          onSubmit: () => invoke('create-product', {
            title: form.title, handle: form.handle, product_type: form.product_type,
            sku: form.sku, price: form.price,
            variant_form: form.variant_form || 'Potted', variant_size: form.variant_size || 'P9',
            subtitle: form.subtitle || undefined, register_slug: true,
          }),
        },
        {
          id: 'product-lookup', name: 'Product Lookup / Edit',
          desc: 'Look up a product by handle or ID — view details, change status, update metafields',
          icon: '⌕',
          fields: [
            { key: 'handle', label: 'Handle', placeholder: 'achillea-love-parade-plants' },
            { key: 'product_id', label: 'or Product ID', placeholder: '15508208124230' },
          ],
          onSubmit: () => invoke('get-product', {
            handle: form.handle || undefined, product_id: form.product_id || undefined,
          }),
        },
        {
          id: 'verify-product', name: 'Verify Product',
          desc: 'Post-creation audit — tracking, images, weight, publication, Katana presence',
          icon: '✓',
          fields: [
            { key: 'handle', label: 'Handle', required: true, placeholder: 'achillea-love-parade-plants' },
          ],
          onSubmit: () => invoke('verify-product', { handle: form.handle }),
        },
        {
          id: 'publish-pdp', name: 'Publish PDP',
          desc: 'Push PDP body HTML and SEO metadata to Shopify',
          icon: '↑',
          fields: [
            { key: 'slug', label: 'Slug', required: true, placeholder: 'achillea-love-parade-plants' },
            { key: 'seo_title', label: 'SEO title', required: true },
            { key: 'seo_description', label: 'SEO description', required: true },
            { key: 'body_html', label: 'Body HTML', required: true, type: 'textarea', placeholder: '<div class="pdp-content">...</div>' },
          ],
          onSubmit: () => invoke('publish-pdp', {
            slug: form.slug, body_html: form.body_html,
            seo_title: form.seo_title, seo_description: form.seo_description,
          }),
        },
      ],
    },
    {
      id: 'orders', label: 'Orders',
      processes: [
        {
          id: 'batch-compose-sweetpeas', name: 'Batch Compose Sweet Peas',
          desc: 'Trigger sweet pea composition via test harness — Pack-of-4 and Cottage Garden Mix',
          icon: '🌸',
          fields: [
            { key: 'order_json', label: 'Order payload (JSON)', required: true, type: 'textarea',
              placeholder: '{\n  "id": 123456,\n  "line_items": [...]\n}' },
          ],
          onSubmit: () => {
            try {
              const payload = JSON.parse(form.order_json);
              return invoke('test-sweetpea-phase2', payload);
            } catch(e) {
              setError('Invalid JSON: ' + e.message); setSubmitting(false);
            }
          },
        },
      ],
    },
    {
      id: 'site', label: 'Site Management',
      processes: [
        {
          id: 'create-redirects', name: 'Create Redirects',
          desc: 'Create URL redirects in Shopify — batch supported',
          icon: '↪',
          fields: [
            { key: 'redirects_text', label: 'Redirects (one per line: /old-path → /new-path)', required: true, type: 'textarea',
              placeholder: '/products/old-slug → /products/new-slug\n/collections/old → /collections/new' },
          ],
          onSubmit: () => {
            const pairs = (form.redirects_text || '').split('\n')
              .map(l => l.trim()).filter(l => l.includes('→'))
              .map(l => { const [f, t] = l.split('→').map(s => s.trim()); return {from: f, to: t}; });
            if (!pairs.length) { setError('No valid redirect lines found. Use → between paths.'); return; }
            return invoke('create-redirect', { redirects: pairs });
          },
        },
      ],
    },
    {
      id: 'bom', label: 'BOM Management',
      processes: [
        {
          id: 'bom-swap', name: 'BOM Component Swap',
          desc: 'Three-system BOM update \u2014 swap a component in Katana, Shopify Metaobject, and Supabase',
          icon: '\uD83D\uDD04',
          custom: true,
        },
      ],
    },
  ];

  // Find the active process definition
  const activeProc = active ? categories.flatMap(c => c.processes).find(p => p.id === active) : null;

  // ── Custom multi-step process (BOM Swap) ──
  if (active === 'bom-swap') {
    return h(BomSwap, { onBack: reset });
  }

  // ── Active process form view ──
  if (activeProc) {
    const canSubmit = activeProc.fields.filter(f => f.required).every(f => form[f.key]);

    return h('div', null,
      h('button', {className:'btn btn-ghost btn-sm', style:{marginBottom:'16px'}, onClick:reset}, '← Back to processes'),

      h('div', {style:{display:'flex', alignItems:'center', gap:'10px', marginBottom:'20px'}},
        h('div', {style:{width:'36px', height:'36px', borderRadius:'8px', background:'var(--olive-50)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px'}}, activeProc.icon),
        h('div', null,
          h('div', {style:{fontSize:'16px', fontWeight:'600', color:'var(--stone-800)'}}, activeProc.name),
          h('div', {style:{fontSize:'12px', color:'var(--stone-500)'}}, activeProc.desc),
        ),
      ),

      h('div', {style:{maxWidth:'640px'}},
        ...activeProc.fields.map(f =>
          h('div', {key:f.key, style:{marginBottom:'16px'}},
            h('label', {style:{display:'block', fontSize:'12px', fontWeight:'500', color:'var(--stone-600)', marginBottom:'4px'}},
              f.label, f.required && h('span', {style:{color:'#dc2626'}}, ' *')
            ),
            f.type === 'textarea'
              ? h('textarea', {
                  value: form[f.key] || '',
                  onChange: e => set(f.key, e.target.value),
                  placeholder: f.placeholder || '',
                  rows: 6,
                  style: {width:'100%', fontSize:'13px', padding:'8px 12px', border:'1px solid var(--stone-200)', borderRadius:'6px', fontFamily:'monospace', resize:'vertical'},
                })
              : f.type === 'select'
                ? h('select', {
                    value: form[f.key] || '',
                    onChange: e => set(f.key, e.target.value),
                    style: {width:'100%', fontSize:'13px', padding:'8px 12px', border:'1px solid var(--stone-200)', borderRadius:'6px'},
                  },
                    h('option', {value:''}, '— Select —'),
                    ...(f.options || []).map(o => h('option', {key:o, value:o}, o))
                  )
                : h('input', {
                    type: f.type === 'number' ? 'text' : 'text',
                    value: form[f.key] || '',
                    onChange: e => set(f.key, e.target.value),
                    placeholder: f.placeholder || '',
                    style: {width:'100%', fontSize:'13px', padding:'8px 12px', border:'1px solid var(--stone-200)', borderRadius:'6px'},
                  })
          )
        ),

        h('div', {style:{display:'flex', gap:'10px', marginTop:'20px'}},
          h('button', {
            className: 'btn btn-primary btn-sm',
            disabled: !canSubmit || submitting,
            onClick: activeProc.onSubmit,
          }, submitting ? 'Running…' : 'Run'),
          h('button', {className:'btn btn-ghost btn-sm', onClick:reset}, 'Cancel'),
        ),
      ),

      // Result display
      error && h('div', {style:{marginTop:'20px', padding:'14px 18px', background:'#fef2f2', border:'1px solid #fecaca', borderRadius:'8px'}},
        h('div', {style:{fontSize:'12px', fontWeight:'600', color:'#dc2626', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'6px'}}, 'Error'),
        h('div', {style:{fontSize:'13px', color:'#991b1b', fontFamily:'monospace', whiteSpace:'pre-wrap'}}, typeof error === 'object' ? JSON.stringify(error, null, 2) : error),
      ),

      result && h('div', {style:{marginTop:'20px', padding:'14px 18px', background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'8px'}},
        h('div', {style:{fontSize:'12px', fontWeight:'600', color:'var(--olive-700)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:'6px'}}, 'Result'),
        h('pre', {style:{fontSize:'12px', color:'var(--stone-700)', fontFamily:'monospace', whiteSpace:'pre-wrap', maxHeight:'400px', overflow:'auto', margin:0}},
          typeof result === 'object' ? JSON.stringify(result, null, 2) : String(result)
        ),
      ),
    );
  }

  // ── Launcher grid ──
  return h('div', null,
    ...categories.map(cat =>
      h('div', {key:cat.id, style:{marginBottom:'32px'}},
        h('div', {style:{fontSize:'13px', fontWeight:'600', color:'var(--stone-500)', textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:'12px', paddingBottom:'8px', borderBottom:'1px solid var(--stone-100)'}}, cat.label),
        h('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'12px'}},
          ...cat.processes.map(p =>
            h('div', {
              key: p.id,
              className: 'alert-card',
              style: {padding:'16px 18px', cursor:'pointer', transition:'box-shadow 0.15s'},
              onClick: () => { setActive(p.id); setForm({}); setResult(null); setError(null); },
              onMouseEnter: e => { e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)'; },
              onMouseLeave: e => { e.currentTarget.style.boxShadow = 'none'; },
            },
              h('div', {style:{display:'flex', alignItems:'center', gap:'10px', marginBottom:'8px'}},
                h('div', {style:{width:'32px', height:'32px', borderRadius:'8px', background:'var(--olive-50)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', flexShrink:0}}, p.icon),
                h('div', {style:{fontSize:'14px', fontWeight:'600', color:'var(--stone-800)'}}, p.name),
              ),
              h('div', {style:{fontSize:'12px', color:'var(--stone-500)', lineHeight:'1.4'}}, p.desc),
            )
          )
        ),
      )
    ),
  );
}

  pagespeed:{ label: 'PageSpeed', icon: '⚡', desc: 'Daily site performance monitoring via WebPageTest' },
  alerts:   { label: 'Alerts',    icon: '🔔', desc: 'Stock, sync, and operational health' },
  attribution: { label: 'Attribution', icon: '◎', desc: 'Channel performance, revenue attribution, and Elevar vs Shopify comparison' },
  processes: { label: 'Processes', icon: '▶', desc: 'Run product, order, and site management operations' },
  docs:     { label: 'Docs',     icon: '📖', desc: 'Ecosystem documentation — functions, tables, tools' },
};

function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);
  const [page, setPage] = useState('overview');
  const [pageOrder, setPageOrder] = useState(() => {
    try {
      const s = localStorage.getItem('cosmo_page_order');
      if (!s) return DEFAULT_PAGE_ORDER;
      const stored = JSON.parse(s);
      const allKeys = Object.keys(PAGES);
      const missing = allKeys.filter(k => !stored.includes(k));
      return missing.length ? [...stored, ...missing] : stored;
    } catch { return DEFAULT_PAGE_ORDER; }
  });
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session: s } }) => {
      setSession(s);
      setChecking(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subscription.unsubscribe();
  }, []);

  const onDragStart = (e, idx) => { setDragIdx(idx); e.dataTransfer.effectAllowed='move'; };
  const onDragOver = (e, idx) => { e.preventDefault(); setOverIdx(idx); };
  const onDragEnd = () => {
    if (dragIdx !== null && overIdx !== null && dragIdx !== overIdx) {
      const newOrder = [...pageOrder];
      const [moved] = newOrder.splice(dragIdx, 1);
      newOrder.splice(overIdx, 0, moved);
      setPageOrder(newOrder);
      try { localStorage.setItem('cosmo_page_order', JSON.stringify(newOrder)); } catch {}
    }
    setDragIdx(null);
    setOverIdx(null);
  };

  if (checking) return h('div',{className:'login-page'}, h('span',{className:'spinner'}));
  if (!session) return h(Login, { onLogin: setSession });

  const pageConfig = PAGES[page];

  return h('div', {className:'app'},
    h('nav', {className:'sidebar'},
      h('div', {className:'sidebar-brand'},
        h('h2', null, 'Cosmo'),
        h('span', null, 'Ashridge Trees'),
      ),
      pageOrder.filter(k => PAGES[k]).map((key, idx) =>
        h('div', {
          key,
          className:`nav-item ${page===key?'active':''} ${dragIdx===idx?'dragging':''} ${overIdx===idx&&dragIdx!==idx?'drag-over':''}`,
          draggable: true,
          onDragStart: e => onDragStart(e, idx),
          onDragOver: e => onDragOver(e, idx),
          onDragEnd: onDragEnd,
          onClick: () => setPage(key),
        },
          h('span', {className:'nav-icon'}, PAGES[key].icon),
          PAGES[key].label,
          h('span', {className:'drag-handle'}, '⋮⋮'),
        )
      ),
      h('div', {className:'sidebar-footer'},
        h('button', { onClick: () => sb.auth.signOut() }, '↳ Sign out'),
      ),
    ),
    h('div', {className:'main'},
      h('div', {className:'main-header'},
        h('h1', {className:'font-serif'}, pageConfig.label),
        h('p', null, pageConfig.desc),
      ),
      h('div', {className:'content'},
        page === 'overview' && h(Overview),
        page === 'ecosystem' && h(Ecosystem),
        page === 'content' && h(ContentEcosystem),
        page === 'staging' && h(Staging),
        page === 'explorer' && h(Explorer),
        page === 'sources' && h(Sources),
        page === 'pagespeed' && h(PageSpeed),
        page === 'alerts' && h(Alerts),
        page === 'attribution' && h(Attribution),
        page === 'processes' && h(Processes),
        page === 'docs' && h(Docs),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
